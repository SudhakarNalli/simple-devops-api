name: Node.js CI/CD Pipeline

# Trigger this workflow every time someone pushes to the main branch
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout your code from GitHub onto the runner machine
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. Set up the correct Node.js version in the cloud environment
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-node-version: '20'
        cache: 'npm'

    # 3. Install dependencies
    - name: Install Dependencies
      run: npm ci

    # 4. Set up Docker Buildx (advanced caching for fast image builds)
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 5. Build the Docker image to make sure it doesn't fail compilation
    - name: Build Docker Image
      run: |
        docker build -t simple-api:${{ github.sha }} .
        echo "Image built successfully with tag commit: ${{ github.sha }}"


